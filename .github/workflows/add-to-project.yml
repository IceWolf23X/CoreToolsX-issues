name: Add issues to CoreX Project

on:
  issues:
    types:
      - opened
      - reopened
      - transferred
      - labeled

permissions:
  contents: read

jobs:
  add-to-project:
    name: Add item to project
    runs-on: ubuntu-latest

    steps:
      - name: Add issue to CoreX Project
        uses: actions/add-to-project@v2.0.0
        with:
          project-url: https://github.com/users/IceWolf23X/projects/4
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
